name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          export HOME=/root
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: List output files
        if: always()
        run: |
          pwd
          ls -la
          ls -la bin/ || echo "bin/ not found"
          cat build.log || echo "build.log not found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: waterpurifier-app-apk
          path: bin/*.apk
